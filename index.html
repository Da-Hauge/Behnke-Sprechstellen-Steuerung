<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behnke Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <span class="material-icons info-icon">admin_panel_settings</span>
            <div class="station-selector-wrapper">
                <small>Sprechstelle</small>
                <select id="stationSwitcher" class="header-dropdown">
                    <option value="" disabled selected>Lade Stationen...</option>
                </select>
            </div>
        </div>
        <div class="header-right">
            <button id="themeToggle" class="icon-btn"><span class="material-icons">brightness_medium</span></button>
        </div>
    </header>

    <main class="container" id="mainContent" style="visibility: hidden; opacity: 0;">
        
        <div class="tile">
            <div class="tile-header">
                <label>Systemstatus</label>
                <div id="systemStatus" class="status-value">Bereit</div>
            </div>
        </div>

        <div class="tile">
            <div class="tile-header">
                <label>Relais 1</label>
                <div id="relayStatus" class="status-value relay-unbekannt">Unbekannt</div>
            </div>
            
            <div class="control-rows">
                <div class="control-row">
                    <span>Temporär öffnen (5s)</span>
                    <button id="triggerBtn" class="btn-trigger">
                        <span id="triggerText">Öffnen</span>
                        <div id="progress" class="btn-progress"></div>
                    </button>
                </div>

                <div class="control-row">
                    <span>Dauerhaft öffnen</span>
                    <label class="switch">
                        <input type="checkbox" id="permanentToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="tile">
            <label>Sicherheits-Einstellungen</label>
            <div class="input-wrapper">
                <span class="material-icons">vpn_key</span>
                <input type="password" id="stationPwd" placeholder="Administrator-Passwort">
            </div>
        </div>

    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
