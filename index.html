<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behnke Master-Steuerung</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="station-info">
            <span class="label">Aktive Station:</span>
            <strong id="currentStationName">Bitte wählen</strong>
        </div>
        <div class="nav-controls">
            <select id="stationSwitcher">
                <option value="" disabled selected>Station wechseln...</option>
                <option value="192.168.104.191">Altbau neue Pforte (191)</option> 
                <option value="192.168.104.192">Altbau neue Pforte (192)</option> 
                <option value="192.168.104.193">Neubau Pforte (193)</option> 
            </select>
            <button id="themeToggle" class="icon-btn"><span class="material-icons">brightness_2</span></button>
        </div>
    </header>

    <div class="container" id="mainContent" style="display: none;">
        <div class="card">
            <div class="status-badge" id="relayStatusField">Relais: Unbekannt</div>
            
            <div class="form-group">
                <label>Admin-Passwort für diese IP:</label>
                <input type="password" id="stationPwd" placeholder="Passwort für diese Station">
            </div>

            <div class="control-section">
                <h3>Türsteuerung</h3>
                
                <button id="triggerBtn" class="btn-main">
                    <span class="material-icons">lock_open</span>
                    <span id="triggerText">Temporär öffnen</span>
                    <div id="countdownBar" class="progress-bar"></div>
                </button>

                <div class="toggle-container">
                    <span>Dauerhaft öffnen</span>
                    <label class="switch">
                        <input type="checkbox" id="permanentToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
