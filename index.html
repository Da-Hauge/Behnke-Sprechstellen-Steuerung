<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behnke Sprechstellen-Steuerung</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <button id="themeToggle" class="theme-toggle" aria-label="Dark Mode umschalten">
        <span class="theme-icon material-icons">brightness_2</span>
    </button>

<div class="container">
    <h1 id="mainTitle">Behnke Sprechstellen-Steuerung</h1>
    
    <div class="form-group">
        <label for="ipSelect" id="ipSelectLabel">Sprechstelle (IP-Adresse) auswählen:</label>
        <select id="ipSelect">
            <option value="">-- Bitte wählen --</option>
            <option value="192.168.104.191">Altbau neue Pforte (192.168.104.191)</option> 
            <option value="192.168.104.192">Altbau neue Pforte (192.168.104.192)</option> 
            <option value="192.168.104.193">Neubau Pforte (192.168.104.193)</option> 
        </select>
    </div>

    <div class="form-group">
        <label for="adminPwd" id="pwdLabel">Administrator-Passwort:</label>
        <input type="password" id="adminPwd" placeholder="Passwort eingeben">
    </div>

    <div class="status-box" id="statusBox">
        Aktueller Status (Relais 1): <br>
        <span class="status-indicator" id="statusDisplay">Warte auf Eingabe...</span>
    </div>

    <div class="btn-group">
        <button id="btnTemp" class="btn-temp">Temporär Auf</button>
        <button id="btnOpen" class="btn-open">Dauerhaft Auf</button>
        <button id="btnClose" class="btn-close">Dauerhaft Zu</button>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
