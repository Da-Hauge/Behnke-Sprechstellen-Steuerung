<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behnke Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <span class="material-icons info-icon">router</span>
            <div>
                <small>Aktive Sprechstelle</small>
                <div id="currentStationName">Bitte wählen...</div>
            </div>
        </div>
        <div class="header-right">
            <select id="stationSwitcher">
                <option value="" disabled selected>Station wählen</option>
                <option value="192.168.104.191">Altbau 191</option> 
                <option value="192.168.104.192">Altbau 192</option> 
                <option value="192.168.104.193">Neubau 193</option> 
            </select>
            <button id="themeToggle" class="icon-btn"><span class="material-icons">brightness_medium</span></button>
        </div>
    </header>

    <main class="container" id="mainContent" style="visibility: hidden;">
        <div class="status-grid">
            <div class="status-card">
                <label>Systemstatus</label>
                <div id="systemStatus" class="status-value">Bereit</div>
            </div>
            <div class="status-card">
                <label>Relais 1</label>
                <div id="relayStatus" class="status-value relay-unbekannt">Unbekannt</div>
            </div>
        </div>

        <div class="control-card">
            <div class="input-section">
                <label for="stationPwd">Administrator-Passwort</label>
                <input type="password" id="stationPwd" placeholder="Passwort für diese IP">
            </div>

            <div class="action-section">
                <button id="triggerBtn" class="btn-trigger">
                    <span class="material-icons">timer</span>
                    <span id="triggerText">Temporär öffnen</span>
                    <div id="progress" class="btn-progress"></div>
                </button>

                <div class="permanent-box">
                    <div class="perm-text">
                        <strong>Dauerhaft öffnen</strong>
                        <p>Simulation durch Auto-Trigger</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="permanentToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
